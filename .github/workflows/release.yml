name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # NOTE: the bundled VPN binaries (OpenVPN/WireGuard) are Apple-Silicon-only.
  # GitHub retired the free macos-13 Intel runner, so the x86_64 VPN slice can no
  # longer be built on free CI. The app itself stays universal (runs on Intel);
  # only the VPN tools are arm64. To restore a universal VPN build, add an Intel
  # job back on a paid macos-*-large runner and lipo its slice in here.
  notarize:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble app bundle
        run: |
          mkdir -p NetFluss.app/Contents/MacOS
          mkdir -p NetFluss.app/Contents/Resources
          mkdir -p NetFluss.app/Contents/Library/HelperTools
          mkdir -p NetFluss.app/Contents/Library/LaunchDaemons
          cp .build/apple/Products/Release/Netfluss NetFluss.app/Contents/MacOS/NetFluss
          cp .build/apple/Products/Release/NetflussPrivilegedHelper NetFluss.app/Contents/Library/HelperTools/NetflussPrivilegedHelper
          cp Packaging/Info.plist NetFluss.app/Contents/Info.plist
          cp Packaging/LaunchDaemons/com.local.netfluss.privilegedhelper.plist \
            NetFluss.app/Contents/Library/LaunchDaemons/com.local.netfluss.privilegedhelper.plist
          cp Packaging/Resources/AppIcon.icns NetFluss.app/Contents/Resources/AppIcon.icns
          cp Packaging/Resources/AppIconDark.icns NetFluss.app/Contents/Resources/AppIconDark.icns
          cp -R Packaging/Resources/SpeedTest NetFluss.app/Contents/Resources/SpeedTest
          cp -R Packaging/Resources/*.lproj NetFluss.app/Contents/Resources/
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" NetFluss.app/Contents/Info.plist
          BUILD=$(git rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" NetFluss.app/Contents/Info.plist

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "ci" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "ci" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" build.keychain

      # Universal (arm64 + x86_64) VPN toolchain. The Intel slice is assembled
      # from pinned x86_64 *ventura* Homebrew bottles downloaded straight from
      # ghcr.io (see build-vpn-bundle.sh) — no Intel runner needed. Hard-gated:
      # the build fails if either slice is missing, so a release can never ship
      # arm64-only VPN by accident (issue #48).
      - name: Bundle VPN tools (universal)
        run: |
          ID="Developer ID Application: Rana GmbH (D6P24X5377)"
          ./Packaging/VPN/build-vpn-bundle.sh NetFluss.app/Contents/Library/VPN "$ID"
          xattr -cr NetFluss.app
          for t in openvpn wg wireguard-go bash; do
            archs="$(lipo -archs "NetFluss.app/Contents/Library/VPN/$t")"
            echo "$t: $archs"
            echo "$archs" | grep -qw x86_64 || { echo "::error::$t is missing its x86_64 slice"; exit 1; }
            echo "$archs" | grep -qw arm64  || { echo "::error::$t is missing its arm64 slice";  exit 1; }
          done

      # The app is signed with the Personal VPN entitlement (allow-vpn) so IKEv2
      # works. That entitlement is restricted and authorized only by an embedded
      # provisioning profile — signing with allow-vpn but NO profile produces an
      # app that fails to launch. So this step is a hard gate: no profile, no build.
      - name: Embed provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.VPN_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$PROFILE_BASE64" ]; then
            echo "::error::VPN_PROVISIONING_PROFILE secret is not set. The app is signed with the Personal VPN entitlement (allow-vpn) and will NOT launch without an embedded provisioning profile. Create it with: base64 -i NetFluss_Developer_ID_VPN.provisionprofile | gh secret set VPN_PROVISIONING_PROFILE"
            exit 1
          fi
          echo "$PROFILE_BASE64" | base64 --decode > NetFluss.app/Contents/embedded.provisionprofile
          # Fail early if the secret didn't decode to a valid CMS-signed profile.
          security cms -D -i NetFluss.app/Contents/embedded.provisionprofile > /dev/null
          echo "Embedded provisioning profile ($(stat -f%z NetFluss.app/Contents/embedded.provisionprofile) bytes)"

      - name: Sign
        run: |
          codesign --force \
            --sign "Developer ID Application: Rana GmbH (D6P24X5377)" \
            --options=runtime \
            --timestamp \
            NetFluss.app/Contents/Library/HelperTools/NetflussPrivilegedHelper
          codesign --force \
            --sign "Developer ID Application: Rana GmbH (D6P24X5377)" \
            --options=runtime \
            --timestamp \
            --entitlements Netfluss-vpn.entitlements \
            NetFluss.app
          codesign --verify --deep --strict NetFluss.app
          # Guard: confirm the shipped app actually carries the VPN entitlement and
          # the profile, so a misconfigured build can never produce a broken release.
          codesign -d --entitlements - NetFluss.app 2>/dev/null | grep -q "allow-vpn" \
            || { echo "::error::allow-vpn entitlement missing from signed app"; exit 1; }
          test -f NetFluss.app/Contents/embedded.provisionprofile \
            || { echo "::error::embedded.provisionprofile missing from signed app"; exit 1; }

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --sequesterRsrc --keepParent NetFluss.app "NetFluss-${VERSION}.zip"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcrun notarytool submit "NetFluss-${VERSION}.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "D6P24X5377" \
            --wait

      - name: Staple
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5 6; do
            if xcrun stapler staple NetFluss.app; then
              break
            fi
            if [ "$attempt" -eq 6 ]; then
              exit 1
            fi
            sleep 20
          done
          xcrun stapler validate NetFluss.app
          rm "NetFluss-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent NetFluss.app "NetFluss-${VERSION}.zip"

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "v${VERSION}" "NetFluss-${VERSION}.zip" --clobber
